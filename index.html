<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Windows Login Flow Diagnostic Tool - Visualize and diagnose login delays for local and domain-joined logins">
  <title>Windows Login Flow &amp; Delay Diagnosis</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='2' y='2' width='13' height='13' fill='%230078d4'/><rect x='17' y='2' width='13' height='13' fill='%230078d4'/><rect x='2' y='17' width='13' height='13' fill='%230078d4'/><rect x='17' y='17' width='13' height='13' fill='%230078d4'/></svg>">
  <style>
    /* ========================================
       CSS Custom Properties (Theming)
       ======================================== */
    :root {
      /* Risk colors */
      --color-risk-none: #10b981;
      --color-risk-low: #22c55e;
      --color-risk-medium: #f59e0b;
      --color-risk-high: #ef4444;
      --color-risk-critical: #991b1b;

      /* Risk background (lighter variants) */
      --color-risk-none-bg: #d1fae5;
      --color-risk-low-bg: #dcfce7;
      --color-risk-medium-bg: #fef3c7;
      --color-risk-high-bg: #fee2e2;
      --color-risk-critical-bg: #fecaca;

      /* Brand / UI colors */
      --color-primary: #0078d4;
      --color-primary-hover: #005a9e;
      --color-bg: #f8fafc;
      --color-surface: #ffffff;
      --color-border: #e2e8f0;
      --color-text: #1e293b;
      --color-text-secondary: #64748b;
      --color-text-muted: #94a3b8;

      /* Spacing scale */
      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;

      /* Typography */
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      --font-size-xs: 0.75rem;
      --font-size-sm: 0.875rem;
      --font-size-base: 1rem;
      --font-size-lg: 1.125rem;
      --font-size-xl: 1.25rem;
      --font-size-2xl: 1.5rem;
      --font-size-3xl: 1.875rem;

      /* Border radius */
      --radius-sm: 0.25rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);

      /* Layout */
      --max-width: 960px;
      --header-height: auto;
    }

    /* ========================================
       Base / Reset
       ======================================== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      color: var(--color-text);
      background-color: var(--color-bg);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ========================================
       Layout (CSS Grid)
       ======================================== */
    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }

    .app__header {
      background-color: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      box-shadow: var(--shadow-sm);
      padding: var(--space-lg) var(--space-xl);
    }

    .app__header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .app__title {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      color: var(--color-primary);
    }

    .app__subtitle {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      margin-top: var(--space-xs);
    }

    .app__main {
      max-width: var(--max-width);
      width: 100%;
      margin: 0 auto;
      padding: var(--space-xl);
    }

    .app__footer {
      background-color: var(--color-surface);
      border-top: 1px solid var(--color-border);
      padding: var(--space-md) var(--space-xl);
      text-align: center;
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
    }

    /* ========================================
       Navigation / Tabs
       ======================================== */
    .nav {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-md);
    }

    .nav__tab {
      padding: var(--space-sm) var(--space-lg);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      cursor: pointer;
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-text-secondary);
      transition: all 0.2s ease;
    }

    .nav__tab:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .nav__tab--active {
      background-color: var(--color-primary);
      border-color: var(--color-primary);
      color: #ffffff;
    }

    .nav__tab--active:hover {
      background-color: var(--color-primary-hover);
      color: #ffffff;
    }

    /* ========================================
       Summary Dashboard
       ======================================== */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
    }

    .summary__card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      box-shadow: var(--shadow-sm);
    }

    .summary__label {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .summary__value {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      margin-top: var(--space-xs);
    }

    /* ========================================
       Timeline
       ======================================== */
    .timeline {
      position: relative;
      padding-left: var(--space-xl);
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0.5rem;
      top: 0;
      bottom: 0;
      width: 2px;
      background-color: var(--color-border);
    }

    .timeline__step {
      position: relative;
      margin-bottom: var(--space-lg);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .timeline__step::before {
      content: '';
      position: absolute;
      left: calc(-1 * var(--space-xl) + 0.25rem);
      top: var(--space-lg);
      width: 0.625rem;
      height: 0.625rem;
      border-radius: 50%;
      background-color: var(--color-primary);
      border: 2px solid var(--color-surface);
    }

    .timeline__step--flagged {
      border-color: var(--color-risk-high);
      box-shadow: var(--shadow-md);
    }

    /* ========================================
       Step Card Content
       ======================================== */
    .step__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }

    .step__name {
      font-size: var(--font-size-lg);
      font-weight: 600;
    }

    .step__number {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      font-weight: 600;
    }

    .step__description {
      color: var(--color-text-secondary);
      font-size: var(--font-size-sm);
      margin-top: var(--space-sm);
    }

    .step__meta {
      display: flex;
      gap: var(--space-md);
      margin-top: var(--space-sm);
      flex-wrap: wrap;
      align-items: center;
    }

    .step__duration {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      font-family: var(--font-mono);
    }

    /* ========================================
       Risk Badge
       ======================================== */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: 0.125rem var(--space-sm);
      border-radius: 9999px;
      font-size: var(--font-size-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .badge--none {
      background-color: var(--color-risk-none-bg);
      color: var(--color-risk-none);
    }

    .badge--low {
      background-color: var(--color-risk-low-bg);
      color: var(--color-risk-low);
    }

    .badge--medium {
      background-color: var(--color-risk-medium-bg);
      color: var(--color-risk-medium);
    }

    .badge--high {
      background-color: var(--color-risk-high-bg);
      color: var(--color-risk-high);
    }

    .badge--critical {
      background-color: var(--color-risk-critical-bg);
      color: var(--color-risk-critical);
    }

    /* ========================================
       Details / Root Cause Panel
       ======================================== */
    .step__details {
      margin-top: var(--space-md);
      border-top: 1px solid var(--color-border);
      padding-top: var(--space-md);
    }

    .step__details summary {
      cursor: pointer;
      font-weight: 600;
      font-size: var(--font-size-sm);
      color: var(--color-primary);
      list-style: none;
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .step__details summary::-webkit-details-marker {
      display: none;
    }

    .step__details[open] summary::before {
      content: '\25BC';
      font-size: var(--font-size-xs);
    }

    .step__details:not([open]) summary::before {
      content: '\25B6';
      font-size: var(--font-size-xs);
    }

    /* ========================================
       Utility
       ======================================== */
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }

    /* ========================================
       Responsive: Mobile (375px)
       ======================================== */
    @media (max-width: 480px) {
      .app__header {
        padding: var(--space-md);
      }

      .app__main {
        padding: var(--space-md);
      }

      .app__title {
        font-size: var(--font-size-xl);
      }

      .nav {
        flex-direction: column;
      }

      .nav__tab {
        text-align: center;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      .step__header {
        flex-direction: column;
        align-items: flex-start;
      }

      .timeline {
        padding-left: var(--space-lg);
      }
    }

    /* ========================================
       Responsive: Tablet (768px)
       ======================================== */
    @media (min-width: 481px) and (max-width: 768px) {
      .summary {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* ========================================
       Responsive: Desktop (1024px+)
       ======================================== */
    @media (min-width: 1024px) {
      .summary {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* ========================================
       Print Styles
       ======================================== */
    @media print {
      body {
        background: #ffffff;
        color: #000000;
        font-size: 11pt;
      }

      .app {
        display: block;
      }

      .app__header {
        box-shadow: none;
        border-bottom: 2px solid #000000;
        padding: 0.5cm 0;
      }

      .app__main {
        padding: 0.5cm 0;
        max-width: 100%;
      }

      .app__footer {
        border-top: 1px solid #000000;
        padding: 0.25cm 0;
      }

      .nav__tab {
        border: 1px solid #999999;
        box-shadow: none;
      }

      .nav__tab--active {
        background-color: #000000;
        color: #ffffff;
      }

      .timeline__step {
        box-shadow: none;
        border: 1px solid #cccccc;
        break-inside: avoid;
      }

      .summary__card {
        box-shadow: none;
        border: 1px solid #cccccc;
      }

      /* Expand all details for print */
      .step__details {
        display: block;
      }

      .step__details[open] summary,
      .step__details summary {
        font-weight: bold;
      }

      .timeline__step--flagged {
        border-color: #000000;
        border-width: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="app" role="application" aria-label="Windows Login Flow Diagnostic Tool">
    <!-- Header -->
    <header class="app__header">
      <div class="app__header-inner">
        <h1 class="app__title">Windows Login Flow &amp; Delay Diagnosis</h1>
        <p class="app__subtitle">Interactive diagnostic tool for identifying and resolving Windows login delays</p>
        <nav class="nav" role="tablist" aria-label="Login type selector">
          <!-- Tabs rendered by JS -->
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app__main">
      <!-- Summary Dashboard -->
      <section class="summary" aria-label="Summary dashboard" id="summary">
        <!-- Rendered by JS -->
      </section>

      <!-- Timeline -->
      <section class="timeline" aria-label="Login step timeline" id="timeline">
        <!-- Rendered by JS -->
      </section>
    </main>

    <!-- Footer -->
    <footer class="app__footer">
      <p>Windows Login Flow Diagnostic Tool &mdash; For IT administrators and system engineers</p>
    </footer>
  </div>

  <script>
    /* ========================================
       Data Constants
       ======================================== */
    const LOGIN_STEPS = {
      local: [
        {
          id: 'local-credential-input',
          name: 'Credential Input',
          description: 'User enters username and password on the Windows lock/login screen.',
          normalDuration: { min: 2, max: 10, unit: 'seconds' },
          delayedDuration: { min: 10, max: 60, unit: 'seconds' },
          delayRisk: 'none',
          rootCauses: [],
          diagnosticTips: ['Ensure keyboard and input devices are responsive.'],
          isUserAction: true
        },
        {
          id: 'local-lsa-authentication',
          name: 'LSA Authentication',
          description: 'Local Security Authority validates credentials against the local SAM database.',
          normalDuration: { min: 100, max: 500, unit: 'ms' },
          delayedDuration: { min: 2, max: 15, unit: 'seconds' },
          delayRisk: 'medium',
          rootCauses: [
            {
              title: 'High CPU or RAM usage during authentication',
              description: 'LSA service competes with other processes for system resources, slowing credential validation.',
              diagnosticCommands: [
                'Get-CimInstance Win32_Processor | Select-Object LoadPercentage',
                'Get-CimInstance Win32_OperatingSystem | Select-Object FreePhysicalMemory, TotalVisibleMemorySize'
              ]
            },
            {
              title: 'Antivirus scanning LSA operations',
              description: 'Real-time AV scanning intercepts LSA credential operations causing delays.',
              diagnosticCommands: [
                'Get-Process | Sort-Object CPU -Descending | Select-Object -First 10 Name, CPU',
                'Get-MpPreference | Select-Object -ExpandProperty ExclusionProcess'
              ]
            }
          ],
          diagnosticTips: [
            'Check Event Viewer > Windows Logs > Security for event 4625 (failed logon attempts).',
            'Monitor LSA process memory usage during login.'
          ],
          isUserAction: false
        },
        {
          id: 'local-password-hash-verification',
          name: 'Password Hash Verification',
          description: 'The entered password is hashed and compared against the stored hash in the SAM database.',
          normalDuration: { min: 50, max: 200, unit: 'ms' },
          delayedDuration: { min: 1, max: 5, unit: 'seconds' },
          delayRisk: 'low',
          rootCauses: [
            {
              title: 'Slow disk I/O reading SAM database',
              description: 'HDD or degraded SSD causes slow reads of the SAM hive.',
              diagnosticCommands: [
                'Get-PhysicalDisk | Select-Object DeviceID, MediaType, HealthStatus',
                'Get-Counter "\\PhysicalDisk(_Total)\\Avg. Disk sec/Read"'
              ]
            }
          ],
          diagnosticTips: [
            'Ensure the system drive is an SSD for optimal performance.',
            'Check disk health with CrystalDiskInfo or S.M.A.R.T. data.'
          ],
          isUserAction: false
        },
        {
          id: 'local-security-token-creation',
          name: 'Security Token Creation',
          description: 'Windows creates an access token containing user SID, group memberships, and privileges for the new session.',
          normalDuration: { min: 50, max: 300, unit: 'ms' },
          delayedDuration: { min: 1, max: 8, unit: 'seconds' },
          delayRisk: 'low',
          rootCauses: [
            {
              title: 'Large number of local group memberships',
              description: 'Token bloat from excessive group memberships increases token creation time.',
              diagnosticCommands: [
                'whoami /groups',
                'net localgroup'
              ]
            }
          ],
          diagnosticTips: [
            'Review local group memberships for the user account.',
            'Check for excessive nested group memberships.'
          ],
          isUserAction: false
        },
        {
          id: 'local-user-profile-load',
          name: 'User Profile Load',
          description: 'Windows loads the user profile (NTUSER.DAT registry hive and profile folders) from disk.',
          normalDuration: { min: 500, max: 3, unit: 'seconds' },
          delayedDuration: { min: 5, max: 60, unit: 'seconds' },
          delayRisk: 'high',
          rootCauses: [
            {
              title: 'Large user profile',
              description: 'Oversized profile folders (Desktop, AppData) slow down the profile load process.',
              diagnosticCommands: [
                'Get-ChildItem $env:USERPROFILE -Recurse -Force -ErrorAction SilentlyContinue | Measure-Object Length -Sum',
                'Get-ChildItem "$env:USERPROFILE\\AppData" -Recurse -Force -ErrorAction SilentlyContinue | Measure-Object Length -Sum'
              ]
            },
            {
              title: 'Corrupted NTUSER.DAT',
              description: 'Corrupt registry hive causes repeated retries and repair attempts during load.',
              diagnosticCommands: [
                'Get-ItemProperty "HKLM:\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\ProfileList\\*" | Select-Object ProfileImagePath, State',
                'reg query "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\ProfileList" /s'
              ]
            },
            {
              title: 'Slow disk performance (HDD)',
              description: 'Mechanical drives significantly slow profile loading especially with large profiles.',
              diagnosticCommands: [
                'Get-PhysicalDisk | Select-Object DeviceID, MediaType, HealthStatus, OperationalStatus'
              ]
            }
          ],
          diagnosticTips: [
            'Check profile size — profiles over 1 GB cause noticeable delays.',
            'Look for temporary files that can be cleaned up.',
            'Consider if NTUSER.DAT is healthy using reg load/unload test.'
          ],
          isUserAction: false
        },
        {
          id: 'local-group-policy',
          name: 'Group Policy (Local)',
          description: 'Local Group Policy objects are applied to the user session.',
          normalDuration: { min: 200, max: 2, unit: 'seconds' },
          delayedDuration: { min: 5, max: 30, unit: 'seconds' },
          delayRisk: 'medium',
          rootCauses: [
            {
              title: 'Complex local policies with WMI filters',
              description: 'WMI filter evaluation on slow hardware adds significant processing time.',
              diagnosticCommands: [
                'gpresult /R /SCOPE USER',
                'Get-WinEvent -LogName "Microsoft-Windows-GroupPolicy/Operational" -MaxEvents 20 | Select-Object TimeCreated, Id, Message'
              ]
            },
            {
              title: 'Software restriction or AppLocker policies',
              description: 'Security policies that scan executables add overhead during policy application.',
              diagnosticCommands: [
                'Get-AppLockerPolicy -Effective | Select-Object -ExpandProperty RuleCollections',
                'gpresult /H "$env:TEMP\\gpresult.html"'
              ]
            }
          ],
          diagnosticTips: [
            'Check Group Policy operational log for slow CSEs (Client-Side Extensions).',
            'Use gpresult /H to generate an HTML report of applied policies.'
          ],
          isUserAction: false
        },
        {
          id: 'local-shell-initialization',
          name: 'Shell Initialization',
          description: 'Windows Explorer shell (explorer.exe) starts, loading the desktop, taskbar, and system tray.',
          normalDuration: { min: 1, max: 5, unit: 'seconds' },
          delayedDuration: { min: 10, max: 60, unit: 'seconds' },
          delayRisk: 'high',
          rootCauses: [
            {
              title: 'Shell extensions and context menu handlers',
              description: 'Third-party shell extensions loaded by explorer.exe can significantly delay initialization.',
              diagnosticCommands: [
                'Get-ItemProperty "HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Shell Extensions\\Approved" | Format-List',
                'Get-Process explorer | Select-Object Id, CPU, WorkingSet64, StartTime'
              ]
            },
            {
              title: 'High disk I/O from concurrent startup processes',
              description: 'Multiple programs starting simultaneously saturate disk bandwidth.',
              diagnosticCommands: [
                'Get-Counter "\\PhysicalDisk(_Total)\\% Disk Time"',
                'Get-Counter "\\PhysicalDisk(_Total)\\Current Disk Queue Length"'
              ]
            }
          ],
          diagnosticTips: [
            'Use Autoruns (Sysinternals) to review shell extensions.',
            'Check Task Manager startup impact ratings.',
            'Monitor disk queue length during login.'
          ],
          isUserAction: false
        },
        {
          id: 'local-startup-programs',
          name: 'Startup Programs',
          description: 'Applications configured to run at login are launched (Run keys, Startup folder, scheduled tasks).',
          normalDuration: { min: 2, max: 10, unit: 'seconds' },
          delayedDuration: { min: 15, max: 120, unit: 'seconds' },
          delayRisk: 'high',
          rootCauses: [
            {
              title: 'Too many startup programs',
              description: 'Excessive startup entries compete for CPU, RAM, and disk resources.',
              diagnosticCommands: [
                'Get-ItemProperty "HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run"',
                'Get-ItemProperty "HKCU:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run"',
                'Get-CimInstance Win32_StartupCommand | Select-Object Name, Command, Location'
              ]
            },
            {
              title: 'Antivirus performing full scan at login',
              description: 'AV solutions triggering scans on startup programs cause cascading delays.',
              diagnosticCommands: [
                'Get-MpComputerStatus | Select-Object QuickScanStartTime, FullScanStartTime, AntivirusEnabled',
                'Get-Process | Where-Object { $_.CPU -gt 30 } | Select-Object Name, CPU, WorkingSet64'
              ]
            },
            {
              title: 'Network-dependent startup apps waiting for connectivity',
              description: 'Applications requiring network access stall if the network is not yet ready.',
              diagnosticCommands: [
                'Get-NetConnectionProfile | Select-Object Name, InterfaceAlias, NetworkCategory, IPv4Connectivity'
              ]
            }
          ],
          diagnosticTips: [
            'Use Task Manager > Startup tab to review startup impact.',
            'Disable unnecessary startup programs.',
            'Check Run registry keys for unexpected entries.'
          ],
          isUserAction: false
        },
        {
          id: 'local-user-environment-ready',
          name: 'User Environment Ready',
          description: 'Desktop is fully loaded and responsive — the user can begin working.',
          normalDuration: { min: 0, max: 2, unit: 'seconds' },
          delayedDuration: { min: 5, max: 30, unit: 'seconds' },
          delayRisk: 'low',
          rootCauses: [
            {
              title: 'Background processes still initializing',
              description: 'Desktop appears but remains sluggish while background tasks complete.',
              diagnosticCommands: [
                'Get-Process | Sort-Object CPU -Descending | Select-Object -First 15 Name, CPU, WorkingSet64'
              ]
            }
          ],
          diagnosticTips: [
            'Wait 1-2 minutes after desktop appears before measuring responsiveness.',
            'Check Resource Monitor for disk and CPU activity.'
          ],
          isUserAction: false
        }
      ],

      domain: [
        {
          id: 'domain-credential-input',
          name: 'Credential Input',
          description: 'User enters domain credentials (DOMAIN\\user or user@domain) on the login screen.',
          normalDuration: { min: 2, max: 10, unit: 'seconds' },
          delayedDuration: { min: 10, max: 60, unit: 'seconds' },

    /* ========================================
       State
       ======================================== */
    let selectedType = 'local';

    /* ========================================
       Helper Functions
       ======================================== */

    /**
     * Convert a duration object to a normalized millisecond value.
     * Handles mixed units (e.g., { min: 500, max: 3, unit: 'seconds' } where min is in ms).
     */
    function durationToMs(value, unit) {
      if (unit === 'ms') return value;
      if (unit === 'seconds' || unit === 'second' || unit === 's') return value * 1000;
      return value;
    }

    /**
     * Format a duration value with its unit for display.
     */
    function formatDuration(min, max, unit) {
      var displayUnit = unit === 'ms' ? 'ms' : 's';
      // Normalize: if unit is seconds but min looks like ms (>= 100), display as mixed
      if (unit === 'seconds' && min >= 100) {
        return min + 'ms – ' + max + 's';
      }
      return min + ' – ' + max + ' ' + displayUnit;
    }

    /**
     * Get the CSS badge class for a given risk level.
     */
    function riskBadgeClass(risk) {
      var map = {
        none: 'badge--none',
        low: 'badge--low',
        medium: 'badge--medium',
        high: 'badge--high',
        critical: 'badge--critical'
      };
      return map[risk] || 'badge--none';
    }

    /**
     * Calculate summary statistics for a set of steps.
     */
    function calcSummary(steps) {
      var totalNormalMs = 0;
      var totalWorstMs = 0;
      var highCriticalCount = 0;

      for (var i = 0; i < steps.length; i++) {
        var step = steps[i];
        var d = step.normalDuration;
        totalNormalMs += durationToMs(d.max, d.unit);

        var dd = step.delayedDuration;
        totalWorstMs += durationToMs(dd.max, dd.unit);

        if (step.delayRisk === 'high' || step.delayRisk === 'critical') {
          highCriticalCount++;
        }
      }

      return {
        totalNormalMs: totalNormalMs,
        totalWorstMs: totalWorstMs,
        highCriticalCount: highCriticalCount,
        stepCount: steps.length
      };
    }

    /**
     * Format milliseconds to a human-readable string.
     */
    function formatMs(ms) {
      if (ms < 1000) return ms + ' ms';
      var secs = ms / 1000;
      if (secs < 60) return secs.toFixed(1) + ' s';
      var mins = Math.floor(secs / 60);
      var remainSecs = Math.round(secs % 60);
      return mins + 'm ' + remainSecs + 's';
    }

    /* ========================================
       Rendering Functions
       ======================================== */

    /**
     * Render the tab navigation.
     */
    function renderTabs() {
      var nav = document.querySelector('.nav');
      nav.innerHTML = '';

      var types = [
        { key: 'local', label: 'Local Login' },
        { key: 'domain', label: 'Domain-Joined Login' }
      ];

      for (var i = 0; i < types.length; i++) {
        var btn = document.createElement('button');
        btn.className = 'nav__tab' + (types[i].key === selectedType ? ' nav__tab--active' : '');
        btn.setAttribute('role', 'tab');
        btn.setAttribute('aria-selected', types[i].key === selectedType ? 'true' : 'false');
        btn.setAttribute('data-type', types[i].key);
        btn.textContent = types[i].label;
        nav.appendChild(btn);
      }
    }

    /**
     * Render the summary dashboard.
     */
    function renderSummary(stats) {
      var container = document.getElementById('summary');
      container.innerHTML = '';

      var cards = [
        { label: 'Steps', value: stats.stepCount },
        { label: 'Normal Time (max)', value: formatMs(stats.totalNormalMs) },
        { label: 'Worst-Case Time', value: formatMs(stats.totalWorstMs) },
        { label: 'High/Critical Risk', value: stats.highCriticalCount }
      ];

      for (var i = 0; i < cards.length; i++) {
        var card = document.createElement('div');
        card.className = 'summary__card';
        card.innerHTML =
          '<div class="summary__label">' + cards[i].label + '</div>' +
          '<div class="summary__value">' + cards[i].value + '</div>';
        container.appendChild(card);
      }
    }

    /**
     * Render the timeline with all step cards.
     */
    function renderTimeline() {
      var container = document.getElementById('timeline');
      container.innerHTML = '';

      var steps = LOGIN_STEPS[selectedType];
      if (!steps) return;

      for (var i = 0; i < steps.length; i++) {
        var step = steps[i];
        var isFlagged = step.delayRisk === 'high' || step.delayRisk === 'critical';

        var card = document.createElement('article');
        card.className = 'timeline__step' + (isFlagged ? ' timeline__step--flagged' : '');
        card.setAttribute('data-step-id', step.id);
        card.setAttribute('data-step-index', i);

        var html =
          '<div class="step__header">' +
            '<div>' +
              '<span class="step__number">Step ' + (i + 1) + '</span> ' +
              '<span class="step__name">' + step.name + '</span>' +
            '</div>' +
            '<span class="badge ' + riskBadgeClass(step.delayRisk) + '">' + step.delayRisk + '</span>' +
          '</div>' +
          '<p class="step__description">' + step.description + '</p>' +
          '<div class="step__meta">' +
            '<span class="step__duration">Normal: ' + formatDuration(step.normalDuration.min, step.normalDuration.max, step.normalDuration.unit) + '</span>' +
          '</div>';

        // Add expandable root cause details if there are root causes
        if (step.rootCauses && step.rootCauses.length > 0) {
          html += '<details class="step__details">' +
            '<summary>Root Causes &amp; Diagnostics (' + step.rootCauses.length + ')</summary>' +
            '<div class="step__details-content">';

          for (var j = 0; j < step.rootCauses.length; j++) {
            var rc = step.rootCauses[j];
            html += '<div style="margin-top: var(--space-sm);">' +
              '<strong style="font-size: var(--font-size-sm);">' + rc.title + '</strong>' +
              '<p style="font-size: var(--font-size-xs); color: var(--color-text-secondary); margin-top: var(--space-xs);">' + rc.description + '</p>';

            if (rc.diagnosticCommands && rc.diagnosticCommands.length > 0) {
              html += '<pre style="background: var(--color-bg); padding: var(--space-sm); border-radius: var(--radius-sm); font-size: var(--font-size-xs); font-family: var(--font-mono); overflow-x: auto; margin-top: var(--space-xs);">';
              for (var k = 0; k < rc.diagnosticCommands.length; k++) {
                html += rc.diagnosticCommands[k] + '\n';
              }
              html += '</pre>';
            }
            html += '</div>';
          }

          // Diagnostic tips
          if (step.diagnosticTips && step.diagnosticTips.length > 0) {
            html += '<div style="margin-top: var(--space-sm); padding-top: var(--space-sm); border-top: 1px solid var(--color-border);">' +
              '<strong style="font-size: var(--font-size-xs); color: var(--color-text-muted);">Tips:</strong>' +
              '<ul style="font-size: var(--font-size-xs); color: var(--color-text-secondary); margin-top: var(--space-xs); padding-left: var(--space-lg);">';
            for (var t = 0; t < step.diagnosticTips.length; t++) {
              html += '<li>' + step.diagnosticTips[t] + '</li>';
            }
            html += '</ul></div>';
          }

          html += '</div></details>';
        }

        card.innerHTML = html;
        container.appendChild(card);
      }
    }

    /**
     * Main render function — orchestrates all rendering.
     */
    function render() {
      var steps = LOGIN_STEPS[selectedType];
      var stats = calcSummary(steps);

      renderTabs();
      renderSummary(stats);
      renderTimeline();
    }

    /* ========================================
       Event Handlers
       ======================================== */

    // Event delegation on nav for tab switching
    document.querySelector('.nav').addEventListener('click', function(e) {
      var tab = e.target.closest('.nav__tab');
      if (!tab) return;

      var type = tab.getAttribute('data-type');
      if (type && type !== selectedType) {
        selectedType = type;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    /* ========================================
       Initialization
       ======================================== */
    render();
  </script>
</body>
</html>
